// ============================================================
// EXPORT
// ============================================================
function exportBackup() {
  var json = JSON.stringify(DB, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'arihantbooks-backup-' + today() + '.json';
  a.click();
  // Also save dated backup to server if running
  if (_serverMode) {
    fetch(SERVER + '/backup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: json
    }).then(function(r){ return r.json(); })
    .then(function(d){ toast('Backup exported & saved to ' + (d.file||'D:\\ArihantBooks')); })
    .catch(function(){ toast('Backup exported (download only)'); });
  } else {
    toast('Backup exported');
  }
}

function openImportBackup() {
  modal('Import Backup',
    '<div style="background:var(--bg3);border-radius:var(--radius2);padding:14px;margin-bottom:16px;font-size:13px;color:var(--text2);line-height:1.8">' +
    '<strong style="color:var(--red)"><i class="ti ti-alert-triangle"></i> Warning:</strong> This will <strong>replace all current data</strong> with the backup. This cannot be undone.' +
    '</div>' +
    '<div style="border:2px dashed var(--border2);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer" onclick="document.getElementById(\'restore-file\').click()">' +
    '<i class="ti ti-database-import" style="font-size:32px;color:var(--text3);display:block;margin-bottom:8px"></i>' +
    '<p style="font-size:13px;color:var(--text2);margin-bottom:12px">Select your backup .json file</p>' +
    '<button class="btn btn-ghost" onclick="event.stopPropagation();document.getElementById(\'restore-file\').click()"><i class="ti ti-upload"></i>Choose File</button>' +
    '<input type="file" id="restore-file" accept=".json" style="display:none" onchange="previewRestore(event)">' +
    '</div>' +
    '<div id="restore-preview" style="margin-top:14px"></div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
    '<button class="btn btn-danger" id="restore-confirm-btn" style="display:none" onclick="doRestore()"><i class="ti ti-database-import"></i>Restore Backup</button>'
  );
}

var restoreData = null;
function previewRestore(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      restoreData = data;
      var inv = (data.salesInvoices||[]).length;
      var pur = (data.purchaseBills||[]).length;
      var items = (data.items||[]).length;
      var parties = (data.parties||[]).length;
      document.getElementById('restore-preview').innerHTML =
        '<div style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25);border-radius:var(--radius2);padding:12px 14px;font-size:13px">' +
        '<i class="ti ti-circle-check" style="color:var(--green)"></i> Valid backup found<br>' +
        '<span style="color:var(--text2)">' + parties + ' parties &nbsp;·&nbsp; ' + items + ' items &nbsp;·&nbsp; ' + inv + ' invoices &nbsp;·&nbsp; ' + pur + ' bills</span></div>';
      document.getElementById('restore-confirm-btn').style.display = 'inline-flex';
    } catch(err) {
      document.getElementById('restore-preview').innerHTML =
        '<div style="color:var(--red);font-size:13px"><i class="ti ti-alert-circle"></i> Invalid file: ' + esc(err.message) + '</div>';
    }
  };
  reader.readAsText(file);
}
function doRestore() {
  if (!restoreData) return;
  if (!confirm('Are you sure? All current data will be replaced.')) return;
  DB = restoreData;
  saveDB();
  closeModal();
  toast('Backup restored successfully');
  go('dashboard');
}

// ============================================================
// BOOT
// ============================================================
(function bootApp() {
  // ── Step 1: Detect and apply mode IMMEDIATELY (before anything renders) ──
  detectMode();

  // ── Step 2: Check if we just came back from a Google OAuth redirect ──
  var justAuthed = _checkOAuthCallback();
  if (justAuthed) {
    setSyncStatus('Signed in to Google Drive ✓ Syncing...');
  }

  // ── Step 3: Try to restore a saved Drive token from previous session ──
  if (!_driveToken) _loadStoredToken();

  // ── Step 4: Load any pending mobile PI queue from localStorage ──
  try {
    var storedQ = localStorage.getItem('arihant_mobile_queue');
    if (storedQ) _mobileQueue = JSON.parse(storedQ) || [];
  } catch(e){ _mobileQueue = []; }

  // ── Step 5: Wrap savePI for mobile queue if in mobile mode ──
  if (_mobileMode) _wrapMobileSavePI();

  // ── Step 6: Try connecting to local server (desktop) or localStorage (mobile) ──
  // ── Step 6: Try connecting to local server (desktop) or localStorage (mobile) ──
  fetch(SERVER + '/data', { method: 'GET' })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data && data.accounts) {
      DB = data;
      if (!DB.proformaInvoices) DB.proformaInvoices = [];
      if (!DB.counters) DB.counters = {};
      if (!DB.counters.proforma) DB.counters.proforma = 1;
      if (DB.settings && DB.settings.address === 'Choolai, Chennai') {
        DB.settings.address = 'Shop no.3, Subha Complex, Old no. 54, New no. 111, AP Road, Choolai, Chennai- 600112';
      }
      if (DB.settings && !DB.settings.phone) DB.settings.phone = '9884689192';
      try { localStorage.setItem(DB_KEY, JSON.stringify(DB)); } catch(e){}
    }
    _serverMode = true;
    var sb = document.getElementById('server-badge');
    var lb = document.getElementById('local-badge');
    if (sb) sb.style.display = 'block';
    if (lb) lb.style.display = 'none';
    go('dashboard');
    // If we just came back from OAuth, auto-continue the sync
    if (justAuthed) setTimeout(function(){ _continueSync(); }, 500);
  })
  .catch(function() {
    _serverMode = false;
    go('dashboard');
    // If we just came back from OAuth, auto-continue the sync
    if (justAuthed) setTimeout(function(){ _continueSync(); }, 500);
  });
})();
</script>
