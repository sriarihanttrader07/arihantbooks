<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArihantBooks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b25;--bg3:#1e2535;--bg4:#252d40;
  --border:#2a3349;--border2:#3a4560;
  --text:#e8ecf4;--text2:#8a96b0;--text3:#5a6480;
  --accent:#4f8ef7;--accent2:#3a7aed;
  --green:#34d399;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;
  --radius:10px;--radius2:6px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex}
.app{display:flex;height:100vh;width:100%;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:grid;place-items:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.logo-text{font-size:15px;font-weight:600}
.logo-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.nav{flex:1;padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nav-section{font-size:10px;color:var(--text3);font-weight:500;padding:8px 8px 4px;letter-spacing:.8px;text-transform:uppercase}
.nav-btn{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius2);cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:rgba(79,142,247,.15);color:var(--accent)}
.nav-btn i{font-size:16px;width:18px;flex-shrink:0}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:13px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:16px;font-weight:600}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{flex:1;overflow-y:auto;padding:22px 24px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius2);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25)}.btn-danger:hover{background:rgba(248,113,113,.22)}
.btn-success{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}.btn-success:hover{background:rgba(52,211,153,.22)}
.btn-sm{padding:4px 8px;font-size:11px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px}
.card-label{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.card-value{font-size:22px;font-weight:600;font-family:'DM Mono',monospace}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;margin-top:8px}
.bg{background:rgba(52,211,153,.12);color:var(--green)}
.br{background:rgba(248,113,113,.12);color:var(--red)}
.bb{background:rgba(79,142,247,.1);color:var(--accent)}
.ba{background:rgba(251,191,36,.1);color:var(--amber)}
.bp{background:rgba(167,139,250,.1);color:var(--purple)}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border)}
.tbl-title{font-size:14px;font-weight:500}
table{width:100%;border-collapse:collapse}
thead th{padding:9px 14px;text-align:left;font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg3)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--bg3)}
tbody tr:last-child{border-bottom:none}
td{padding:10px 14px;font-size:13px}
.mono{font-family:'DM Mono',monospace;font-size:12px}
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500}
.payment-actions{display:flex;gap:4px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.full{grid-column:1/-1}
label{font-size:12px;color:var(--text2);font-weight:500}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);padding:8px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input[readonly]{opacity:.6}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:65px}
.lt{width:100%;border-collapse:collapse;font-size:13px}
.lt th{text-align:left;padding:8px 10px;font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;background:var(--bg3);border:1px solid var(--border)}
.lt td{padding:3px 5px;border:1px solid var(--border);background:var(--bg2)}
.lt td input{border:none;background:transparent;padding:5px 6px;width:100%;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px}
.lt td input:focus{outline:none;background:rgba(79,142,247,.07)}
.lt-amt{font-weight:600;color:var(--accent);font-family:'DM Mono',monospace;padding:5px 8px;display:block}
.del-btn{background:rgba(248,113,113,.1);border:none;color:var(--red);cursor:pointer;padding:4px 8px;border-radius:4px;font-size:12px}
.del-btn:hover{background:rgba(248,113,113,.25)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);width:100%;max-width:800px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hd-title{font-size:15px;font-weight:600}
.modal-bd{padding:20px;overflow-y:auto;overflow-x:auto;flex:1}
.modal-ft{padding:13px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:var(--text3);gap:10px}
.empty i{font-size:36px}
.empty p{font-size:13px}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--radius2);padding:3px;margin-bottom:20px;width:fit-content;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:7px 14px;border-radius:5px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.rrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.rsec{font-weight:600;font-size:11px;color:var(--accent);padding:12px 0 5px;border-bottom:2px solid var(--border2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.rtot{font-weight:600;font-size:14px;padding:10px 0;border-top:2px solid var(--border2);display:flex;justify-content:space-between}
.rindent{padding-left:16px;color:var(--text2)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:11px 16px;border-radius:var(--radius);font-size:13px;z-index:2000;display:none;align-items:center;gap:8px;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .3s}
.toast.show{display:flex}
.toast.ts{border-color:rgba(52,211,153,.4)}
.toast.te{border-color:rgba(248,113,113,.4)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── MOBILE MODE ── */
.mobile-only{display:none}
.desktop-only{display:block}
/* Bottom tab bar */
.mobile-tabbar{display:none;position:fixed;bottom:0;left:0;width:100%;width:100vw;box-sizing:border-box;z-index:999;background:var(--bg2);border-top:1px solid var(--border);padding:4px 0 max(4px,env(safe-area-inset-bottom));flex-direction:row;align-items:stretch;justify-content:space-around}
.mobile-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 4px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:500;border:none;background:none;flex:1;min-width:0;font-family:'DM Sans',sans-serif;transition:color .15s;text-transform:uppercase;letter-spacing:.3px}
.mobile-tab i{font-size:20px}
.mobile-tab.active{color:var(--accent)}
.mobile-tab-more{position:relative}
.mobile-more-menu{display:none;position:fixed;bottom:60px;left:0;width:100%;width:100vw;box-sizing:border-box;background:var(--bg2);border-top:1px solid var(--border);padding:8px;z-index:998;flex-direction:column;gap:2px}
.mobile-more-menu.open{display:flex}
.mobile-more-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius2);cursor:pointer;color:var(--text2);font-size:14px;border:none;background:none;width:100%;font-family:'DM Sans',sans-serif;text-align:left}
.mobile-more-item:hover,.mobile-more-item:active{background:var(--bg3);color:var(--text)}
.mobile-more-item i{font-size:18px;width:20px}
/* Mobile layout - key: everything must scroll vertically, nothing clips */
body.mobile-mode{overflow-y:auto;overflow-x:hidden;height:auto;max-width:100vw;width:100%}
body.mobile-mode .app{flex-direction:column;height:auto;min-height:100vh;overflow-x:hidden;overflow-y:visible;padding-bottom:80px;max-width:100%;box-sizing:border-box}
body.mobile-mode .sidebar{display:none!important}
body.mobile-mode .main{flex:1;overflow:visible;min-height:0}
body.mobile-mode .content{padding:12px;overflow-x:hidden;overflow-y:visible;height:auto;min-height:0;max-width:100%;box-sizing:border-box}
body.mobile-mode .topbar{display:none}
body.mobile-mode .mobile-tabbar{display:flex}
body.mobile-mode .mobile-only{display:block}
body.mobile-mode .desktop-only{display:none}
body.mobile-mode .card-value{font-size:16px}
/* All table wrappers get horizontal scroll on mobile */
body.mobile-mode .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;box-sizing:border-box}
body.mobile-mode .grid4{grid-template-columns:1fr 1fr;gap:8px}
body.mobile-mode .grid3{grid-template-columns:1fr 1fr;gap:8px}
body.mobile-mode .grid2{grid-template-columns:1fr 1fr;gap:8px}
body.mobile-mode .mobile-sync-bar{display:flex!important}
.mobile-sync-bar{display:none;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:11px;color:var(--text3);gap:10px;flex-shrink:0}
@media(max-width:600px){
  html{overflow-x:hidden;max-width:100vw}
  body.mobile-mode .form-grid{grid-template-columns:1fr}
  body.mobile-mode td,body.mobile-mode th{padding:7px 8px;font-size:12px}
  body.mobile-mode .modal{max-width:100vw;border-radius:12px 12px 0 0;align-self:flex-end}
  body.mobile-mode .modal-wrap{align-items:flex-end}
  /* Force ALL grid containers to 2 columns on mobile — covers inline style grids too */
  body.mobile-mode [style*="grid-template-columns:repeat(3"]{grid-template-columns:1fr 1fr!important}
  body.mobile-mode [style*="grid-template-columns:repeat(4"]{grid-template-columns:1fr 1fr!important}
  body.mobile-mode [style*="grid-template-columns:1fr 1fr 1fr"]{grid-template-columns:1fr 1fr!important}
  body.mobile-mode [style*="grid-template-columns:1fr 1fr 1fr 1fr"]{grid-template-columns:1fr 1fr!important}
  /* Stat cards should never overflow */
  body.mobile-mode .card{min-width:0;word-break:break-word;padding:12px 14px}
  body.mobile-mode .card-value{font-size:14px!important;word-break:break-word}
  body.mobile-mode .card-label{font-size:10px!important}
  body.mobile-mode .card-sub{font-size:10px!important}
}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">A</div>
      <div><div class="logo-text">ArihantBooks</div><div class="logo-sub">v1.0 · offline</div></div>
    </div>
    <nav class="nav">
      <div class="nav-section">Overview</div>
      <button class="nav-btn active" data-page="dashboard" onclick="go('dashboard')"><i class="ti ti-layout-dashboard"></i>Dashboard</button>
      <div class="nav-section">Transactions</div>
      <button class="nav-btn" data-page="proforma" onclick="go('proforma')"><i class="ti ti-file-description"></i>Proforma Invoices</button>
      <button class="nav-btn" data-page="sales" onclick="go('sales')"><i class="ti ti-receipt"></i>Sales Invoices</button>
      <button class="nav-btn desktop-only" data-page="purchases" onclick="go('purchases')"><i class="ti ti-shopping-cart"></i>Purchase Bills</button>
      <div class="nav-section">Masters</div>
      <button class="nav-btn" data-page="inventory" onclick="go('inventory')"><i class="ti ti-package"></i>Inventory</button>
      <button class="nav-btn" data-page="parties" onclick="go('parties')"><i class="ti ti-users"></i>Parties</button>
      <div class="nav-section desktop-only">Accounts</div>
      <button class="nav-btn desktop-only" data-page="coa" onclick="go('coa')"><i class="ti ti-list-tree"></i>Chart of Accounts</button>
      <button class="nav-btn desktop-only" data-page="journal" onclick="go('journal')"><i class="ti ti-notebook"></i>Journal Entries</button>
      <div class="nav-section">Reports</div>
      <button class="nav-btn" data-page="reports" onclick="go('reports')"><i class="ti ti-chart-bar"></i>Reports</button>
      <button class="nav-btn mobile-only" onclick="toggleMode()"><i class="ti ti-device-desktop"></i>Desktop Mode</button>
    </nav>
    <div class="sidebar-footer">
      <div id="server-badge" style="display:none;font-size:10px;color:var(--green);text-align:center;padding:4px 0 6px;font-family:'DM Mono',monospace"><i class="ti ti-circle-check"></i> Auto-saving to D:\ArihantBooks</div>
      <div id="local-badge" style="font-size:10px;color:var(--amber);text-align:center;padding:4px 0 6px"><i class="ti ti-alert-triangle"></i> Saving to browser only</div>
      <button class="btn btn-ghost" style="width:100%;justify-content:center;font-size:12px;margin-bottom:6px" onclick="exportBackup()"><i class="ti ti-download"></i>Export Backup</button>
      <button class="btn btn-ghost" style="width:100%;justify-content:center;font-size:12px" onclick="openImportBackup()"><i class="ti ti-database-import"></i>Import Backup</button>
      <button class="btn btn-ghost" style="width:100%;justify-content:center;font-size:12px;margin-top:6px" onclick="driveSync()"><i class="ti ti-cloud-upload"></i>Sync to Drive</button>
      <button class="btn btn-ghost" style="width:100%;justify-content:center;font-size:11px;margin-top:4px;color:var(--text3)" onclick="toggleMode()"><i class="ti ti-device-mobile"></i>Switch to Mobile View</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="mobile-sync-bar" id="mobile-sync-bar"><span id="sync-status-text"><i class="ti ti-cloud"></i> Not synced yet</span><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="driveSync()" id="sync-btn"><i class="ti ti-refresh"></i>Sync</button></div></div>    <div class="content" id="content"></div>
  </div>
</div>

<!-- Mobile bottom tab bar -->
<div class="mobile-tabbar" id="mobile-tabbar">
  <button class="mobile-tab active" data-page="dashboard" onclick="mobileGo('dashboard')"><i class="ti ti-layout-dashboard"></i>Home</button>
  <button class="mobile-tab" data-page="proforma" onclick="mobileGo('proforma')"><i class="ti ti-file-description"></i>PI</button>
  <button class="mobile-tab" data-page="sales" onclick="mobileGo('sales')"><i class="ti ti-receipt"></i>Sales</button>
  <button class="mobile-tab" data-page="inventory" onclick="mobileGo('inventory')"><i class="ti ti-package"></i>Stock</button>
  <button class="mobile-tab mobile-tab-more" onclick="toggleMoreMenu()"><i class="ti ti-dots"></i>More</button>
</div>
<div class="mobile-more-menu" id="mobile-more-menu">
  <button class="mobile-more-item" onclick="mobileGo('purchases');toggleMoreMenu()"><i class="ti ti-shopping-cart"></i>Purchase Bills</button>
  <button class="mobile-more-item" onclick="mobileGo('parties');toggleMoreMenu()"><i class="ti ti-users"></i>Parties</button>
  <button class="mobile-more-item" onclick="mobileGo('reports');toggleMoreMenu()"><i class="ti ti-chart-bar"></i>Reports</button>
  <button class="mobile-more-item" onclick="driveSync();toggleMoreMenu()"><i class="ti ti-cloud-upload"></i>Sync with Drive</button>
  <button class="mobile-more-item" onclick="toggleMode();toggleMoreMenu()"><i class="ti ti-device-desktop"></i>Switch to Desktop</button>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-hd-title" id="modal-title"></div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-bd" id="modal-body"></div>
    <div class="modal-ft" id="modal-foot"></div>
  </div>
</div>

<script>
// ============================================================
// GOOGLE DRIVE SYNC SETUP INSTRUCTIONS
// ============================================================
// To enable Google Drive sync, follow these steps ONCE:
//
// 1. Go to https://console.cloud.google.com
// 2. Create a new project (e.g. "ArihantBooks Sync")
// 3. Enable "Google Drive API":
//    APIs & Services → Enable APIs → search "Google Drive API" → Enable
// 4. Create OAuth credentials:
//    APIs & Services → Credentials → Create Credentials → OAuth 2.0 Client ID
//    Application type: Web application
//    Name: ArihantBooks
//    Authorised JavaScript origins — add ALL of these:
//      http://localhost:5050
//    Authorised redirect URIs — add ALL of these:
//      http://localhost:5050/
//      http://localhost:5050/ArihantBooks.html
//      (also add the full file:// path if opening file directly on phone,
//       e.g. file:///storage/emulated/0/Download/ArihantBooks.html)
//    NOTE: The redirect flow does not require JavaScript origins to match —
//    the redirect URI is what matters. Add any URL you open this file from.
// 5. Copy your Client ID (looks like: 123456789-abc.apps.googleusercontent.com)
// 6. Paste it into the GDRIVE_CLIENT_ID variable below (replace YOUR_GOOGLE_CLIENT_ID_HERE)
// 7. Save the file and restart the server
//
// That's it! The "Sync to Drive" button on the desktop and the
// "Sync" button on mobile will now work.
// ============================================================

// ============================================================
// DATA
// ============================================================
var DB_KEY = 'arihantbooks_v1';
var SERVER = 'http://localhost:5050';
var _serverMode = false;
// ============================================================
// GOOGLE DRIVE SYNC
// ============================================================
// SETUP: Replace with your Google OAuth 2.0 Client ID from
// https://console.cloud.google.com → APIs & Services → Credentials
// Authorised JavaScript origins: add the URL you open this file from
// e.g. http://localhost:5050 and/or null (for file:// access)
var GDRIVE_CLIENT_ID = '39589346167-dj16dvocsedr7qbcb8hnbk10chdnef8b.apps.googleusercontent.com';
var GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
var GDRIVE_DATA_FILENAME  = 'ArihantBooks_data.json';
var GDRIVE_QUEUE_FILENAME = 'ArihantBooks_mobile_queue.json';

var _driveToken = null;
var _mobileMode = false;

// ── Mode detection — uses multiple signals, not just innerWidth ───────────────
function _isMobileDevice() {
  var ua = navigator.userAgent || '';
  var uaMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
  var hasTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  var narrowScreen = (window.screen && window.screen.width < 800) || window.innerWidth < 768;
  return uaMobile || (hasTouch && narrowScreen);
}
function detectMode() {
  var forced = localStorage.getItem('arihant_force_mode');
  if (forced === 'mobile') { _mobileMode = true; }
  else if (forced === 'desktop') { _mobileMode = false; }
  else { _mobileMode = _isMobileDevice(); }
  if (_mobileMode) document.body.classList.add('mobile-mode');
}

// ── OAuth 2.0 Implicit / Redirect Flow ───────────────────────────────────────
// Works on file://, localhost, and any origin — no popup required.
// Token is returned in the URL hash after Google redirects back to this page.

function _getRedirectURI() {
  // Use the current page URL as the redirect target (minus any hash)
  return window.location.href.split('#')[0];
}

function _startOAuthRedirect() {
  // Save current page state so we can resume after redirect
  try {
    localStorage.setItem('arihant_oauth_pending', '1');
    localStorage.setItem('arihant_oauth_page', document.querySelector('.nav-btn.active') ? document.querySelector('.nav-btn.active').dataset.page || 'dashboard' : 'dashboard');
  } catch(e){}

  var params = new URLSearchParams({
    client_id: GDRIVE_CLIENT_ID,
    redirect_uri: _getRedirectURI(),
    response_type: 'token',
    scope: GDRIVE_SCOPE,
    include_granted_scopes: 'true',
    state: 'arihant_oauth'
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

function _checkOAuthCallback() {
  // Check if we just came back from Google OAuth redirect
  var hash = window.location.hash;
  if (!hash || hash.indexOf('access_token') === -1) return false;

  var params = {};
  hash.slice(1).split('&').forEach(function(p) {
    var kv = p.split('='); params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
  });

  if (params.access_token) {
    _driveToken = params.access_token;
    // Store token with expiry time
    var expiry = Date.now() + (parseInt(params.expires_in || 3600) * 1000);
    try {
      localStorage.setItem('arihant_drive_token', _driveToken);
      localStorage.setItem('arihant_drive_token_expiry', expiry);
    } catch(e){}
    // Clean the hash from the URL without reloading
    if (window.history && window.history.replaceState) {
      window.history.replaceState(null, '', window.location.href.split('#')[0]);
    }
    return true;
  }
  return false;
}

function _loadStoredToken() {
  // Restore a previously saved token if it hasn't expired yet
  try {
    var token = localStorage.getItem('arihant_drive_token');
    var expiry = parseInt(localStorage.getItem('arihant_drive_token_expiry') || '0');
    if (token && expiry > Date.now() + 60000) { // 60s buffer before expiry
      _driveToken = token;
      return true;
    }
  } catch(e){}
  return false;
}

function driveSync() {
  if (!checkInternet()) { toast('No internet connection', 'error'); return; }
  if (!GDRIVE_CLIENT_ID || GDRIVE_CLIENT_ID.length < 20 || GDRIVE_CLIENT_ID.indexOf('YOUR_GOOGLE') !== -1) {
    toast('Google Drive not configured — paste your Client ID into the file', 'error'); return;
  }
  setSyncStatus('Connecting to Google Drive...');
  if (_driveToken) { _continueSync(); return; }
  if (_loadStoredToken()) { _continueSync(); return; }
  // No valid token — redirect to Google for sign-in
  _startOAuthRedirect();
}

function checkInternet() { return navigator.onLine !== false; }

// ── Drive file helpers ────────────────────────────────────────────────────────
function _handleDriveAuth401() {
  // Token expired — clear it and re-trigger OAuth redirect
  _driveToken = null;
  try { localStorage.removeItem('arihant_drive_token'); localStorage.removeItem('arihant_drive_token_expiry'); } catch(e){}
  toast('Drive session expired — signing in again...', 'error');
  setTimeout(function(){ _startOAuthRedirect(); }, 1500);
}

function driveListFile(name, cb) {
  fetch('https://www.googleapis.com/drive/v3/files?q=name%3D%22' + encodeURIComponent(name) + '%22+and+trashed%3Dfalse&fields=files(id,name,modifiedTime)', {
    headers: { Authorization: 'Bearer ' + _driveToken }
  }).then(function(r){
    if (r.status === 401) { _handleDriveAuth401(); cb(new Error('401'), null); return Promise.reject('401'); }
    return r.json();
  }).then(function(d){
    if (d && d.error && d.error.code === 401) { _handleDriveAuth401(); cb(new Error('401'), null); return; }
    cb(null, d.files && d.files.length ? d.files[0] : null);
  }).catch(function(e){ if (e !== '401') cb(e, null); });
}

function driveReadFile(fileId, cb) {
  if (!fileId) { cb(null, null); return; }
  fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media', {
    headers: { Authorization: 'Bearer ' + _driveToken }
  }).then(function(r){
    if (r.status === 401) { _handleDriveAuth401(); cb(new Error('401'), null); return Promise.reject('401'); }
    return r.json();
  }).then(function(d){
    if (d && d.error && d.error.code === 401) { _handleDriveAuth401(); cb(new Error('401'), null); return; }
    cb(null, d);
  }).catch(function(e){ if (e !== '401') cb(e, null); });
}

function driveWriteFile(name, fileId, data, cb) {
  var body = JSON.stringify(data, null, 2);
  var blob = new Blob([body], {type: 'application/json'});
  var meta = JSON.stringify({name: name, mimeType: 'application/json'});
  var fd = new FormData();
  fd.append('metadata', new Blob([meta], {type: 'application/json'}));
  fd.append('file', blob);
  var url = fileId
    ? 'https://www.googleapis.com/upload/drive/v3/files/' + fileId + '?uploadType=multipart'
    : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  fetch(url, {
    method: fileId ? 'PATCH' : 'POST',
    headers: { Authorization: 'Bearer ' + _driveToken },
    body: fd
  }).then(function(r){
    if (r.status === 401) { _handleDriveAuth401(); cb(new Error('401'), null); return Promise.reject('401'); }
    return r.json();
  }).then(function(d){
    if (d && d.error && d.error.code === 401) { _handleDriveAuth401(); cb(new Error('401'), null); return; }
    cb(null, d);
  }).catch(function(e){ if (e !== '401') cb(e, null); });
}

// ── DESKTOP sync flow: push full data, pull mobile queue and merge ─────────────
function _desktopSyncFlow() {
  setSyncStatus('Pushing data to Drive...');
  driveListFile(GDRIVE_DATA_FILENAME, function(err, file) {
    driveWriteFile(GDRIVE_DATA_FILENAME, file ? file.id : null, DB, function(err2, result) {
      if (err2) { toast('Drive push failed', 'error'); setSyncStatus('Sync failed'); return; }
      setSyncStatus('Checking for mobile PIs...');
      driveListFile(GDRIVE_QUEUE_FILENAME, function(err3, qfile) {
        if (!qfile) {
          setSyncStatus('Synced ✓ No mobile PIs waiting');
          toast('Data pushed to Drive. No mobile PIs in queue.');
          return;
        }
        driveReadFile(qfile.id, function(err4, queue) {
          if (err4 || !queue || !queue.length) {
            setSyncStatus('Synced ✓ ' + new Date().toLocaleTimeString());
            toast('Data pushed to Drive.');
            return;
          }
          // Merge PIs from mobile queue into desktop DB
          var merged = 0, skipped = 0;
          queue.forEach(function(pi) {
            var dupe = (DB.proformaInvoices||[]).find(function(x){ return x.number === pi.number; });
            if (dupe) { skipped++; return; }
            if (!DB.proformaInvoices) DB.proformaInvoices = [];
            DB.proformaInvoices.push(pi);
            merged++;
          });
          // Clear the queue on Drive
          driveWriteFile(GDRIVE_QUEUE_FILENAME, qfile.id, [], function() {
            saveDB();
            setSyncStatus('Synced ✓ ' + merged + ' PI(s) merged');
            toast('Merged ' + merged + ' mobile PI(s).' + (skipped ? ' ' + skipped + ' duplicate(s) skipped.' : ''));
            if (merged > 0 && document.querySelector('.nav-btn.active[data-page="proforma"]')) {
              renderProforma();
            }
          });
        });
      });
    });
  });
}

// ── MOBILE sync flow: pull full data, push local PI queue ────────────────────
var _mobileQueue = []; // holds PIs created on mobile, not yet synced

function _mobileSyncFlow() {
  setSyncStatus('Pulling latest data from Drive...');
  driveListFile(GDRIVE_DATA_FILENAME, function(err, file) {
    if (err || !file) { toast('No laptop data found in Drive. Sync from laptop first.', 'error'); setSyncStatus('Sync failed — no data'); return; }
    driveReadFile(file.id, function(err2, data) {
      if (err2 || !data) { toast('Failed to read data from Drive', 'error'); setSyncStatus('Sync failed'); return; }
      // Preserve mobile-created PIs before overwriting DB
      var localPIs = _mobileQueue.slice();
      DB = data;
      if (!DB.proformaInvoices) DB.proformaInvoices = [];
      if (!DB.counters) DB.counters = {};
      if (!DB.counters.proforma) DB.counters.proforma = 1;
      try { localStorage.setItem(DB_KEY, JSON.stringify(DB)); } catch(e){}
      setSyncStatus('Pushing mobile PIs...');
      if (!localPIs.length) {
        setSyncStatus('Synced ✓ ' + new Date().toLocaleTimeString());
        toast('Data synced from Drive.'); _refreshCurrentPage(); return;
      }
      // Push the mobile PI queue to Drive
      driveListFile(GDRIVE_QUEUE_FILENAME, function(err3, qfile) {
        driveReadFile(qfile ? qfile.id : null, function(err4, existing) {
          var existingQueue = (existing && Array.isArray(existing)) ? existing : [];
          var merged = existingQueue.concat(localPIs);
          driveWriteFile(GDRIVE_QUEUE_FILENAME, qfile ? qfile.id : null, merged, function(err5) {
            if (err5) { toast('Failed to push PIs to Drive', 'error'); return; }
            _mobileQueue = [];
            localStorage.setItem('arihant_mobile_queue', JSON.stringify([]));
            setSyncStatus('Synced ✓ ' + localPIs.length + ' PI(s) pushed');
            toast('Synced! ' + localPIs.length + ' PI(s) sent to laptop.');
            _refreshCurrentPage();
          });
        });
      });
    });
  });
}

// Auto-push PI queue to Drive when on mobile and online
function mobilePushPI(pi) {
  _mobileQueue.push(pi);
  try { localStorage.setItem('arihant_mobile_queue', JSON.stringify(_mobileQueue)); } catch(e){}
  if (checkInternet() && _driveToken) {
    driveListFile(GDRIVE_QUEUE_FILENAME, function(err, qfile) {
      driveReadFile(qfile ? qfile.id : null, function(err2, existing) {
        var existingQueue = (existing && Array.isArray(existing)) ? existing : [];
        var merged = existingQueue.concat([pi]);
        driveWriteFile(GDRIVE_QUEUE_FILENAME, qfile ? qfile.id : null, merged, function() {
          setSyncStatus('PI saved & pushed to Drive ✓');
        });
      });
    });
  }
}

function fmt(n) {
  return '\u20B9' + Number(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
// Convert internal "YYYY-MM-DD" date strings to display format "DD-MM-YYYY"
function fmtDateDMY(d) {
  if (!d || d.length < 10) return d || '';
  var p = d.split('-');
  return p[2] + '-' + p[1] + '-' + p[0];
}
function today() { return new Date().toISOString().split('T')[0]; }
// Formats a comma-separated address into readable multi-line HTML for invoices.
// Splits roughly in half by comma count so it reads naturally on two lines
// instead of one long unbroken string.
function fmtAddressHTML(addr) {
  if (!addr) return '';
  var parts = addr.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
  if (parts.length <= 2) return esc(addr);
  var mid = Math.ceil(parts.length / 2);
  var line1 = parts.slice(0, mid).join(', ');
  var line2 = parts.slice(mid).join(', ');
  return esc(line1) + '<br>' + esc(line2);
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// Case-insensitive lookups: items/parties are matched regardless of how the name
// was typed (e.g. "della profiles" finds "Della Profiles"), but the ORIGINAL
// stored casing is always preserved and displayed — typing in caps never creates
// a duplicate item/party.
function sameText(a, b) { return String(a||'').trim().toLowerCase() === String(b||'').trim().toLowerCase(); }
function findItemByName(name) { return DB.items.find(function(i){ return sameText(i.name, name); }); }
function findPartyByName(name) { return DB.parties.find(function(p){ return sameText(p.name, name); }); }

    if (oldName !== name) {
      DB.salesInvoices.forEach(function(inv){ if (sameText(inv.party, oldName)) inv.party = name; });
      DB.purchaseBills.forEach(function(inv){ if (sameText(inv.party, oldName)) inv.party = name; });
      (DB.payments||[]).forEach(function(pay){ if (sameText(pay.party, oldName)) pay.party = name; });
      toast('Party renamed — ' + (DB.salesInvoices.filter(function(i){return i.party===name;}).length + DB.purchaseBills.filter(function(i){return i.party===name;}).length) + ' linked records updated');
    }
  }
  else { DB.parties.push(p); }
  saveDB(); closeModal(); if (id ? false : true) toast('Party saved'); renderParties();
}

function filterInventory() {
  var q = (document.getElementById('inv-search').value||'').toLowerCase();
  var cat = (document.getElementById('inv-cat-filter').value||'').toLowerCase();
  var stock = document.getElementById('inv-stock-filter').value||'';
  var tbody = document.getElementById('inv-tbody');
  if (!tbody) return;
  var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));

  rows.forEach(function(r){
    var name = r.dataset.name||'', code = r.dataset.code||'', rcat = r.dataset.cat||'';
    var qty = parseFloat(r.dataset.qty||0);
    var low = r.dataset.low||'';
    var matchQ = !q || name.indexOf(q)>=0 || code.indexOf(q)>=0;
    var matchCat = !cat || rcat === cat;
    var matchStock = true;
    if (stock === 'low') matchStock = low === 'low';
    else if (stock === 'zero') matchStock = qty <= 0;
    else if (stock === 'instock') matchStock = true; // show all, just sort
    r.style.display = (matchQ && matchCat && matchStock) ? '' : 'none';
  });

  // Sort: in-stock items first, zero stock at bottom
  if (stock === 'instock' || stock === '') {
    var visible = rows.filter(function(r){ return r.style.display !== 'none'; });
    visible.sort(function(a, b){
      var qa = parseFloat(a.dataset.qty||0);
      var qb = parseFloat(b.dataset.qty||0);
      if (qa <= 0 && qb > 0) return 1;
      if (qa > 0 && qb <= 0) return -1;
      return 0;
    });
    visible.forEach(function(r){ tbody.appendChild(r); });
  }
}

    '</div>' +
    '<div id="csv-preview" style="margin-top:14px"></div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
    '<button class="btn btn-primary" id="csv-import-btn" style="display:none" onclick="doImport()"><i class="ti ti-check"></i>Import</button>'
  );
  csvParsed = [];
}
function previewCSV(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var lines = ev.target.result.split(/\r?\n/).filter(function(l){ return l.trim(); });
    if (lines.length < 2) { toast('File looks empty', 'error'); return; }
    var headers = lines[0].split(',').map(function(h){ return h.trim().toLowerCase().replace(/["\s]/g,''); });
    csvParsed = [];
    for (var i = 1; i < lines.length; i++) {
      var vals = parseCSVLine(lines[i]);
      var obj = {}; headers.forEach(function(h,j){ obj[h] = (vals[j]||'').trim().replace(/^"|"$/g,''); });
      if (!obj.name) continue;
      csvParsed.push({
        id: uid(), name: obj.name, code: obj.code||'', category: obj.category||'',
        unit: obj.unit||'Nos',
        qty: parseFloat(obj.qty)||0,
        reorderLevel: parseFloat(obj.reorderlevel)||0,
        costPrice: parseFloat(obj.costprice)||0,
        salePrice: parseFloat(obj.saleprice)||0,
        description: ''
      });
    }
    var prev = document.getElementById('csv-preview');
    if (!csvParsed.length) { prev.innerHTML = '<p style="color:var(--red);font-size:13px">No valid rows found. Ensure row 1 has headers including "name".</p>'; return; }
    var tbl = '<p style="font-size:13px;color:var(--text2);margin-bottom:8px"><i class="ti ti-circle-check" style="color:var(--green)"></i> ' + csvParsed.length + ' items ready</p>';
    tbl += '<div style="max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius2)"><table style="width:100%;border-collapse:collapse;font-size:12px">';
    tbl += '<thead><tr><th style="padding:6px 10px;background:var(--bg3);border-bottom:1px solid var(--border);color:var(--text3)">Name</th><th style="padding:6px 10px;background:var(--bg3);border-bottom:1px solid var(--border);color:var(--text3)">Code</th><th style="padding:6px 10px;background:var(--bg3);border-bottom:1px solid var(--border);color:var(--text3)">Qty</th><th style="padding:6px 10px;background:var(--bg3);border-bottom:1px solid var(--border);color:var(--text3)">Cost</th></tr></thead><tbody>';
    csvParsed.forEach(function(r){
      tbl += '<tr style="border-bottom:1px solid var(--border)"><td style="padding:5px 10px">' + esc(r.name) + '</td><td style="padding:5px 10px;color:var(--text3)">' + esc(r.code||'—') + '</td><td style="padding:5px 10px;font-family:monospace">' + r.qty + '</td><td style="padding:5px 10px;font-family:monospace">' + fmt(r.costPrice) + '</td></tr>';
    });
    tbl += '</tbody></table></div>';
    prev.innerHTML = tbl;
    document.getElementById('csv-import-btn').style.display = 'inline-flex';
  };
  reader.readAsText(file);
}
function parseCSVLine(line) {
  var vals = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') { inQ = !inQ; } else if (ch === ',' && !inQ) { vals.push(cur); cur = ''; } else { cur += ch; }
  }
  vals.push(cur);
  return vals;
}
function doImport() {
  var existing = {};
  DB.items.forEach(function(i){ existing[i.name.toLowerCase()] = true; });
  var added = 0, skipped = 0;
  csvParsed.forEach(function(it){
    if (existing[it.name.toLowerCase()]) { skipped++; } else { DB.items.push(it); added++; }
  });
  saveDB(); closeModal();
  toast('Imported ' + added + ' item' + (added!==1?'s':'') + (skipped?' · '+skipped+' skipped':''));
  renderInventory();
}

var invLines = [];
var invType = 'sales';

// ── Monthly view helpers ───────────────────────────────────────────────────────
// ============================================================
// FY & DATE HELPERS
// ============================================================
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function monthKey(d) { return d ? d.slice(0,7) : ''; }
function monthLabel(k) { var p=k.split('-'); return MONTHS[parseInt(p[1],10)-1]+' '+p[0]; }

// India FY: April–March. Given a date string, return "YYYY-YY" FY label
function fyOfDate(dateStr) {
  if (!dateStr) return '';
  var p = dateStr.split('-'); var y = parseInt(p[0]); var m = parseInt(p[1]);
  if (m >= 4) return y + '-' + String(y+1).slice(2);
  else return (y-1) + '-' + String(y).slice(2);
}
// Get all FYs present in an array of invoice objects
function allFYs(arr) {
  var set = {};
  arr.forEach(function(i){ var f=fyOfDate(i.date); if(f) set[f]=1; });
  return Object.keys(set).sort().reverse();
}
// Current FY
function currentFY() {
  var now = new Date(); var m = now.getMonth()+1; var y = now.getFullYear();
  if (m >= 4) return y + '-' + String(y+1).slice(2);
  else return (y-1) + '-' + String(y).slice(2);
}
// Filter array to a specific FY
function filterFY(arr, fy) {
  return arr.filter(function(i){ return fyOfDate(i.date)===fy; });
}
// Month keys within an FY (Apr–Mar order)
function monthsInFY(fy) {
  var startY = parseInt(fy.split('-')[0]);
  var keys = [];
  for (var m=4; m<=12; m++) keys.push(startY+'-'+String(m).padStart(2,'0'));
  for (var m=1; m<=3; m++) keys.push((startY+1)+'-'+String(m).padStart(2,'0'));
  return keys;
}
function groupByMonth(arr) {
  var g={};
  arr.forEach(function(i){ var k=monthKey(i.date); if(!g[k])g[k]=[]; g[k].push(i); });
  Object.keys(g).forEach(function(k){
    g[k].sort(function(a,b){ var d=a.date.localeCompare(b.date); return d!==0?d:(a.number||'').localeCompare(b.number||''); });
  });
  return g;
}
function fySelector(id, arr, onChange) {
  var fys = allFYs(arr); var cur = currentFY();
  if (fys.indexOf(cur)<0) fys.unshift(cur);
  return '<select id="'+id+'" style="padding:8px 14px;font-size:14px;font-weight:500;border-radius:var(--radius2);background:var(--bg2);border:1px solid var(--border2);color:var(--text)" onchange="'+onChange+'">' +

function removePILine(id) {
  if (piLines.length === 1) { toast('At least one line required', 'error'); return; }

function piLineItemChange(input, id) {
  var ln = piLines.find(function(l){ return l.id===id; }); if (!ln) return;
  ln.item = input.value;
  var it = findItemByName(input.value);
  if (it) {
    var pe = document.getElementById('pi-prc-'+id);
    if (pe && !pe.value) { pe.value = it.salePrice||0; ln.price = it.salePrice||0; }
    var qe = document.getElementById('pi-qty-'+id);
    if (qe && qe.value && pe) piLineCalc(id, 'price');
  }
  piRecalc();
}
function piLineCalc(id, changed) {
  var ln = piLines.find(function(l){ return l.id===id; }); if (!ln) return;
  var qe = document.getElementById('pi-qty-'+id);
  var pe = document.getElementById('pi-prc-'+id);
  var ae = document.getElementById('pi-amt-'+id);
  var qty   = parseFloat(qe ? qe.value : '') || 0;
  var price = parseFloat(pe ? pe.value : '') || 0;
  var amt   = parseFloat(ae ? ae.value : '') || 0;

  if (changed === 'qty' || changed === 'price') {
    amt = qty * price;
    if (ae) ae.value = amt ? amt.toFixed(2) : '';
  } else if (changed === 'amount') {
    if (qty > 0) {
      price = amt / qty;
      if (pe) pe.value = price.toFixed(2);
    } else if (price > 0) {
      qty = amt / price;
      if (qe) qe.value = qty.toFixed(2);
    }
  }

  ln.qty    = parseFloat(qe ? qe.value : '') || 0;
  ln.price  = parseFloat(pe ? pe.value : '') || 0;
  ln.amount = parseFloat(ae ? ae.value : '') || 0;
  piRecalc();
}
function piRecalc() {
  var sub = piLines.reduce(function(s,l){ return s+(l.amount||0); }, 0);
  var disc = parseFloat((document.getElementById('pi-disc')||{}).value)||0;
  var beforeRound = sub - disc;
  var rounded = Math.round(beforeRound);
  var roundOff = rounded - beforeRound;
  var se = document.getElementById('pi-sub');
  var re = document.getElementById('pi-roundoff');
  var te = document.getElementById('pi-tot');
  if (se) se.textContent = fmt(sub);
  if (re) {
    if (Math.abs(roundOff) > 0.001) {
      re.textContent = (roundOff > 0 ? '+' : '') + roundOff.toFixed(2);
      re.parentElement.style.display = '';
    } else {
      re.parentElement.style.display = 'none';
    }
  }
  if (te) te.textContent = fmt(rounded);
}
function savePI(editId) {
  var party = document.getElementById('pi-party').value;
  if (!party) { toast('Please select a customer', 'error'); return; }
  var valid = piLines.filter(function(l){ return l.item && (l.amount||0)>0; });
  if (!valid.length) { toast('Add at least one line item', 'error'); return; }
  var sub = valid.reduce(function(s,l){ return s+(l.amount||0); }, 0);
  var disc = parseFloat(document.getElementById('pi-disc').value)||0;
  var total = Math.round(sub - disc);
  var roundOff = total - (sub - disc);
  var number = document.getElementById('pi-no').value.trim();
  if (!number) { toast('PI number is required', 'error'); return; }
  // Check for duplicate PI number (excluding the one being edited)
  var dupe = (DB.proformaInvoices||[]).find(function(x){ return x.number===number && x.id!==editId; });
  if (dupe) { toast('PI number "' + number + '" already exists — please use a different number', 'error'); return; }

  if (editId) {
    var pi = DB.proformaInvoices.find(function(x){ return x.id===editId; });
    if (!pi) return;
    pi.number = number;
    pi.date = document.getElementById('pi-date').value;
    pi.party = party;
    pi.validUntil = document.getElementById('pi-validity').value;
    pi.notes = document.getElementById('pi-notes').value;
    pi.lines = valid; pi.subtotal = sub; pi.discount = disc; pi.total = total;
    toast('Proforma invoice updated');
  } else {
    DB.proformaInvoices.push({
      id: uid(), number: number, date: document.getElementById('pi-date').value,
      party: party, validUntil: document.getElementById('pi-validity').value,
      notes: document.getElementById('pi-notes').value,
      lines: valid, subtotal: sub, discount: disc, total: total,
      status: 'Open'
    });
    DB.counters.proforma++;
  }
  saveDB(); closeModal(); redrawPI();
}

function _buildPrintHTML(title, bodyHTML) {
  return '<!DOCTYPE html><html><head><title>' + esc(title) + '</title>' +
    '<style>' + PRINT_CSS + '</style></head><body>' + bodyHTML + '</body></html>';
}

function _openPrintWindow(title, bodyHTML) {
  var w = window.open('', '_blank');
  if (!w) { toast('Please allow popups for this site', 'error'); return; }
  w.document.write(_buildPrintHTML(title, bodyHTML));
  w.document.close();
  setTimeout(function(){ w.print(); }, 400);
}


function exportPIPDF(id) {
  var pi = (DB.proformaInvoices||[]).find(function(x){ return x.id===id; }); if (!pi) return;
  var printable = document.getElementById('pi-printable');
  if (!printable) { toast('Nothing to export', 'error'); return; }
  _openPrintWindow('Proforma Invoice - ' + pi.number, printable.innerHTML);
}
function convertPIToInvoice(id) {
  var pi = (DB.proformaInvoices||[]).find(function(x){ return x.id===id; }); if (!pi) return;
  if (pi.status !== 'Open') { toast('Only Open proforma invoices can be converted', 'error'); return; }
  if (!confirm('Convert "' + pi.number + '" into a real Sales Invoice? This will post it to Sales, update stock and party balance, and mark this PI as Converted.')) return;

  // Re-use the PI's own number for the Sales Invoice number, checking for duplicates first
  var invNumber = pi.number;
  var dupe = DB.salesInvoices.find(function(x){ return x.number === invNumber; });
  if (dupe) {
    invNumber = invNumber + '-INV';
    var dupe2 = DB.salesInvoices.find(function(x){ return x.number === invNumber; });
    if (dupe2) invNumber = invNumber + '-' + Date.now().toString(36).slice(-4);
    toast('Note: "' + pi.number + '" already exists in Sales Invoices — used "' + invNumber + '" instead', 'error');
  }

  var inv = {
    id: uid(), number: invNumber, date: today(),
    party: pi.party, payMode: 'Credit', notes: pi.notes || ('PI Reference: ' + pi.number),
    lines: pi.lines.map(function(l){ return { item:l.item, qty:l.qty, price:l.price, amount:l.amount }; }),
    subtotal: pi.subtotal, discount: pi.discount, total: pi.total,
    status: 'Unpaid'
  };

  // Apply stock effect (deduct sold qty) + auto-create missing inventory items
  inv.lines.forEach(function(ln){
    var it = findItemByName(ln.item);
    if (it) { it.qty = (it.qty||0) - ln.qty; }
    else { DB.items.push({ id: uid(), name: ln.item, code:'', category:'', unit:'Nos', qty:0, reorderLevel:0, costPrice:0, salePrice: ln.price, description:'' }); }
  });
  // Apply party balance effect
  var p = DB.parties.find(function(x){ return x.name===pi.party; });
  if (p) p.balance = (p.balance||0) + inv.total;

  DB.salesInvoices.push(inv);
  DB.counters.sales++;
  pi.status = 'Converted';
  pi.convertedInvoiceId = inv.id;
  pi.convertedInvoiceNumber = invNumber;

  saveDB(); toast('Converted to Sales Invoice ' + invNumber); redrawPI();
}

function deleteInv(id, type) {
  if (!confirm('Delete this entry? Stock quantities will be reversed.')) return;
  var arr = type === 'sales' ? DB.salesInvoices : DB.purchaseBills;
  var inv = arr.find(function(x){ return x.id===id; });
  if (inv && inv.lines) {
    inv.lines.forEach(function(ln){
      var it = findItemByName(ln.item);
      if (it) {
        if (type === 'sales') {
          // reverse: add back qty that was deducted
          it.qty = (it.qty||0) + ln.qty;
        } else {
          // reverse: deduct qty that was added, recalc WAC if possible
          var newQty = (it.qty||0) - ln.qty;
          it.qty = newQty < 0 ? 0 : newQty;
        }
      }
    });
    // Reverse party balance
    var p = DB.parties.find(function(x){ return x.name===inv.party; });
    if (p) p.balance = type === 'sales' ? (p.balance||0) - inv.total : (p.balance||0) + inv.total;
  }
  if (type === 'sales') DB.salesInvoices = DB.salesInvoices.filter(function(x){ return x.id!==id; });
  else DB.purchaseBills = DB.purchaseBills.filter(function(x){ return x.id!==id; });
  saveDB(); toast('Deleted & stock reversed');
  type === 'sales' ? redrawInvFY('sales') : redrawInvFY('purchases');
}

function saveEditInv(id, type) {
  var isSales = type === 'sales';
  var arr = isSales ? DB.salesInvoices : DB.purchaseBills;
  var inv = arr.find(function(x){ return x.id===id; });
  if (!inv) return;

  var party = document.getElementById('inv-party').value;
  if (!party) { toast('Please select a party', 'error'); return; }
  var valid = invLines.filter(function(l){ return l.item && (l.amount||0)>0; });
  if (!valid.length) { toast('Add at least one line item', 'error'); return; }

  var sub = valid.reduce(function(s,l){ return s+(l.amount||0); }, 0);
  var disc = parseFloat(document.getElementById('inv-disc').value)||0;
  var total = Math.round(sub - disc);
  var roundOff = total - (sub - disc);
  var payMode = document.getElementById('inv-pay').value;

  // ── Step 1: Reverse the OLD invoice's effect on stock (using a snapshot, not live data) ──
  var oldLines = inv.lines || [];
  oldLines.forEach(function(ln){
    var it = findItemByName(ln.item);
    if (it) it.qty = isSales ? (it.qty||0) + ln.qty : Math.max(0, (it.qty||0) - ln.qty);
  });
  // Reverse OLD party balance effect (on the OLD party, in case party was changed)
  var oldParty = DB.parties.find(function(x){ return x.name===inv.party; });
  if (oldParty) oldParty.balance = isSales ? (oldParty.balance||0) - inv.total : (oldParty.balance||0) + inv.total;

  // ── Step 2: Apply the NEW invoice's effect on stock ──
  valid.forEach(function(ln){
    var it = findItemByName(ln.item);
    if (it) {
      if (isSales) {
        it.qty = (it.qty||0) - ln.qty;
      } else {
        if (ln.price > 0) {
          var oldVal = (it.qty||0) * (it.costPrice||0);
          var newVal = ln.qty * ln.price;
          var newQty = (it.qty||0) + ln.qty;
          it.costPrice = newQty > 0 ? (oldVal + newVal) / newQty : ln.price;
        }
        it.qty = (it.qty||0) + ln.qty;
      }
    } else {
      // Auto-create inventory item if it doesn't exist
      DB.items.push({ id: uid(), name: ln.item, code: '', category: '', unit: 'Nos',
        qty: isSales ? 0 : ln.qty, reorderLevel: 0,
        costPrice: isSales ? 0 : ln.price, salePrice: isSales ? ln.price : 0, description: '' });
    }
  });

  // Apply NEW party balance effect (on the NEW party — usually same as old)
  var newParty = findPartyByName(party);
  if (newParty) newParty.balance = isSales ? (newParty.balance||0) + total : (newParty.balance||0) - total;

  // ── Step 3: Update the invoice record itself ──
  inv.number = document.getElementById('inv-no').value || inv.number;
  inv.party = party;
  inv.date = document.getElementById('inv-date').value;
  inv.payMode = payMode;
  inv.notes = document.getElementById('inv-notes').value;
  inv.lines = valid;
  inv.subtotal = sub;
  inv.discount = disc;
  inv.total = total;
  inv.status = payMode === 'Credit' ? 'Unpaid' : 'Paid';

  saveDB(); closeModal(); toast('Updated successfully');
  isSales ? redrawInvFY('sales') : redrawInvFY('purchases');
}

function lineItemChange(input, id) {
  var ln = invLines.find(function(l){ return l.id===id; }); if (!ln) return;
  ln.item = input.value;
  var it = findItemByName(input.value);
  if (it) {
    var pe = document.getElementById('prc-'+id);
    if (pe && !pe.value) { pe.value = it.salePrice||0; ln.price = it.salePrice||0; }
    // Auto-fill amount if qty already entered
    var qe = document.getElementById('qty-'+id);
    if (qe && qe.value && pe) lineCalc(id, 'price');
  }
  recalc();
}
// Tally-style: any two fields calculate the third
// changed: which field was just edited ('qty', 'price', or 'amount')
function lineCalc(id, changed) {
  var ln = invLines.find(function(l){ return l.id===id; }); if (!ln) return;
  var qe = document.getElementById('qty-'+id);
  var pe = document.getElementById('prc-'+id);
  var ae = document.getElementById('amt-'+id);
  var qty   = parseFloat(qe ? qe.value : '') || 0;
  var price = parseFloat(pe ? pe.value : '') || 0;
  var amt   = parseFloat(ae ? ae.value : '') || 0;

  if (changed === 'qty' || changed === 'price') {
    // Qty or Price changed → recalculate Amount
    amt = qty * price;
    if (ae) ae.value = amt ? amt.toFixed(2) : '';
  } else if (changed === 'amount') {
    // Amount changed → keep Qty constant, recalculate Price (Tally's default)
    if (qty > 0) {
      price = amt / qty;
      if (pe) pe.value = price.toFixed(2);
    } else if (price > 0) {
      // No qty set but price is set → recalculate qty
      qty = amt / price;
      if (qe) qe.value = qty.toFixed(2);
    }
    // If neither qty nor price → just store amount, leave others blank
  }

  ln.qty    = parseFloat(qe ? qe.value : '') || 0;
  ln.price  = parseFloat(pe ? pe.value : '') || 0;
  ln.amount = parseFloat(ae ? ae.value : '') || 0;
  recalc();
}
function recalc() {
  var sub = invLines.reduce(function(s,l){ return s+(l.amount||0); }, 0);
  var disc = parseFloat((document.getElementById('inv-disc')||{}).value)||0;
  var beforeRound = sub - disc;
  var rounded = Math.round(beforeRound);
  var roundOff = rounded - beforeRound;
  var se = document.getElementById('inv-sub');
  var re = document.getElementById('inv-roundoff');
  var te = document.getElementById('inv-tot');
  if (se) se.textContent = fmt(sub);
  if (re) {
    if (Math.abs(roundOff) > 0.001) {
      re.textContent = (roundOff > 0 ? '+' : '') + roundOff.toFixed(2);
      re.parentElement.style.display = '';
    } else {
      re.parentElement.style.display = 'none';
    }
  }
  if (te) te.textContent = fmt(rounded);
}
function saveInv() {
  var party = document.getElementById('inv-party').value;
  if (!party) { toast('Please select a party', 'error'); return; }
  var valid = invLines.filter(function(l){ return l.item && (l.amount||0)>0; });
  if (!valid.length) { toast('Add at least one line item', 'error'); return; }
  var sub = valid.reduce(function(s,l){ return s+(l.amount||0); }, 0);
  var disc = parseFloat(document.getElementById('inv-disc').value)||0;
  var total = Math.round(sub - disc);
  var roundOff = total - (sub - disc);
  var payMode = document.getElementById('inv-pay').value;
  var inv = {
    id: uid(),
    number: document.getElementById('inv-no').value,
    date: document.getElementById('inv-date').value,
    party: party, payMode: payMode,
    notes: document.getElementById('inv-notes').value,
    lines: valid, subtotal: sub, discount: disc, total: total,
    status: payMode === 'Credit' ? 'Unpaid' : 'Paid'
  };
  var isSales = invType === 'sales';
  valid.forEach(function(ln){
    var it = findItemByName(ln.item);
    if (it) {
      if (isSales) {
        it.qty = it.qty - ln.qty;
      } else {
        if (ln.price > 0) {
          var oldVal = (it.qty||0) * (it.costPrice||0);
          var newVal = ln.qty * ln.price;
          var newQty = (it.qty||0) + ln.qty;
          it.costPrice = newQty > 0 ? (oldVal + newVal) / newQty : ln.price;
        }
        it.qty = (it.qty||0) + ln.qty;
      }
    }
  });
  // Auto-create inventory item if it doesn't exist
  valid.forEach(function(ln){
    if (!findItemByName(ln.item)) {
      DB.items.push({ id: uid(), name: ln.item, code: '', category: '', unit: 'Nos',
        qty: isSales ? 0 : ln.qty,
        reorderLevel: 0,
        costPrice: isSales ? 0 : ln.price,
        salePrice: isSales ? ln.price : 0,
        description: '' });
    }
  });
  var p = findPartyByName(party);
  if (p) p.balance = isSales ? (p.balance||0)+total : (p.balance||0)-total;
  if (isSales) { DB.salesInvoices.push(inv); DB.counters.sales++; }
  else { DB.purchaseBills.push(inv); DB.counters.purchase++; }
  saveDB(); closeModal(); toast('Invoice saved & posted');
  isSales ? redrawInvFY('sales') : redrawInvFY('purchases');
}

function computePartyBalance(party) {
  // EXACT same convention as the Party Ledger (showLedgerDetail): Sales and
  // Purchases both increase the magnitude outstanding; Payments (regardless of
  // type) reduce it. The party's own `type` (Customer/Supplier/Both) determines
  // whether that magnitude means "they owe you" or "you owe them" — the formula
  // itself doesn't need separate signs for sales vs purchases.
  var bal = 0;
  DB.salesInvoices.forEach(function(i){ if (sameText(i.party, party.name)) bal += (i.total||0); });
  DB.purchaseBills.forEach(function(i){ if (sameText(i.party, party.name)) bal += (i.total||0); });
  (DB.payments||[]).forEach(function(p){ if (sameText(p.party, party.name)) bal -= (p.amount||0); });
  return bal;
}
function oldestUnpaidDate(party) {
  // For context: the earliest dated Sales Invoice or Purchase Bill still marked Unpaid
  var dates = [];
  DB.salesInvoices.forEach(function(i){ if (sameText(i.party, party.name) && i.status==='Unpaid') dates.push(i.date); });
  DB.purchaseBills.forEach(function(i){ if (sameText(i.party, party.name) && i.status==='Unpaid') dates.push(i.date); });
  if (!dates.length) return null;
  return dates.sort()[0];
}
function drawOutstanding() {
  var q = ((document.getElementById('out-search')||{}).value||'').toLowerCase();
  var sort = (document.getElementById('out-sort')||{}).value || 'amount-desc';

  var rows = DB.parties.map(function(p){
    var bal = computePartyBalance(p);
    return { party: p, bal: bal, oldest: oldestUnpaidDate(p) };
  }).filter(function(r){ return Math.abs(r.bal) > 0.01; }); // hide fully settled parties

  if (q) rows = rows.filter(function(r){ return r.party.name.toLowerCase().indexOf(q) >= 0; });

  if (sort === 'amount-desc') rows.sort(function(a,b){ return Math.abs(b.bal) - Math.abs(a.bal); });
  else if (sort === 'amount-asc') rows.sort(function(a,b){ return Math.abs(a.bal) - Math.abs(b.bal); });
  else rows.sort(function(a,b){ return a.party.name.localeCompare(b.party.name); });

  // Classification: a Supplier with outstanding balance means YOU owe them (Payable).
  // A Customer with outstanding balance means THEY owe you (Receivable).
  // "Both" type parties: positive net = they owe you more overall (Receivable side),
  // negative net is rare since sales/purchases both add the same direction here —
  // for a "Both" party we fall back to whichever they have more of.
  function isPayable(r) {
    if (r.party.type === 'Supplier') return true;
    if (r.party.type === 'Customer') return false;
    // type === 'Both': compare actual purchase vs sales volume to decide intent
    var totalPurch = DB.purchaseBills.filter(function(i){ return sameText(i.party, r.party.name); }).reduce(function(s,i){ return s+(i.total||0); }, 0);
    var totalSales = DB.salesInvoices.filter(function(i){ return sameText(i.party, r.party.name); }).reduce(function(s,i){ return s+(i.total||0); }, 0);
    return totalPurch > totalSales;
  }

  var receivables = rows.filter(function(r){ return !isPayable(r); }); // customers who owe YOU
  var payables = rows.filter(function(r){ return isPayable(r); });    // suppliers YOU owe

  var totalReceivable = receivables.reduce(function(s,r){ return s+r.bal; }, 0);
  var totalPayable = payables.reduce(function(s,r){ return s+Math.abs(r.bal); }, 0);

  var html = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">';
  html += statCard('Total Receivable', fmt(totalReceivable), receivables.length+' parties owe you', 'bg');
  html += statCard('Total Payable', fmt(totalPayable), payables.length+' parties you owe', 'br');
  html += statCard('Net Position', fmt(totalReceivable - totalPayable), (totalReceivable-totalPayable)>=0?'Net positive':'Net negative', (totalReceivable-totalPayable)>=0?'bg':'br');
  html += '</div>';

  function outstandingTable(title, list, icon) {
    var t = '<div class="tbl-wrap" style="margin-bottom:16px"><div class="tbl-head"><span class="tbl-title">' + title + ' (' + list.length + ')</span></div>';
    if (list.length) {
      t += '<table><thead><tr><th>Party</th><th>Type</th><th>Oldest Unpaid</th><th style="text-align:right">Amount</th><th></th></tr></thead><tbody>';
      list.forEach(function(r){
        var ageNote = r.oldest ? fmtDateDMY(r.oldest) : '—';
        t += '<tr><td><strong>' + esc(r.party.name) + '</strong></td>';
        t += '<td><span class="pill ' + (r.party.type==='Customer'?'bb':r.party.type==='Supplier'?'ba':'bp') + '" style="font-size:10px">' + esc(r.party.type) + '</span></td>';
        t += '<td>' + ageNote + '</td>';
        t += '<td class="mono" style="text-align:right;font-weight:600">' + fmt(Math.abs(r.bal)) + '</td>';
        t += '<td><button class="btn btn-ghost btn-sm" onclick="goToPartyLedger(&quot;' + r.party.id + '&quot;)"><i class="ti ti-eye"></i></button></td></tr>';
      });
      t += '</tbody></table>';
    } else {
      t += emptyState(icon, 'Nothing outstanding here');
    }
    t += '</div>';
    return t;
  }

  html += outstandingTable('Receivables — They Owe You', receivables, 'ti-circle-arrow-down');
  html += outstandingTable('Payables — You Owe Them', payables, 'ti-circle-arrow-up');

  document.getElementById('out-body').innerHTML = html;
}

  tabs.forEach(function(t){ if (t.textContent.indexOf('Party Ledger') >= 0) ledgerTab = t; });

  html += '<div class="rsec" style="margin-top:16px">Cost of Goods Sold</div>';
  html += '<div class="rrow"><span>Purchases</span><span style="font-family:monospace">'+fmt(tPurch)+'</span></div>';

  }
  html += '<div style="background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.2);border-radius:var(--radius2);padding:14px 18px;margin-top:16px;display:flex;justify-content:space-between;align-items:center">';

  html += '<table><thead><tr><th>Month</th><th style="text-align:right">Sales</th><th style="text-align:right">Purchases</th><th style="text-align:right">Gross Profit</th></tr></thead><tbody>';
  var totS=0, totP=0;
  fyMonths.forEach(function(k){

    var mg=ms-mp;
    if (!ms && !mp) return;
    totS+=ms; totP+=mp;
    html += '<tr><td>'+monthLabel(k)+'</td>'+
      '<td class="mono" style="text-align:right">'+fmt(ms)+'</td>'+
      '<td class="mono" style="text-align:right">'+fmt(mp)+'</td>'+
      '<td class="mono" style="text-align:right;color:'+(mg>=0?'var(--green)':'var(--red)')+'">'+fmt(mg)+'</td></tr>';
  });
  html += '</tbody><tfoot><tr style="background:var(--bg3)">'+
    '<td style="padding:10px 14px;font-weight:600">FY Total</td>'+
    '<td class="mono" style="text-align:right;padding:10px 14px;font-weight:600;color:var(--accent)">'+fmt(totS)+'</td>'+
    '<td class="mono" style="text-align:right;padding:10px 14px;font-weight:600;color:var(--accent)">'+fmt(totP)+'</td>'+
    '<td class="mono" style="text-align:right;padding:10px 14px;font-weight:600;color:'+(totS-totP>=0?'var(--green)':'var(--red)')+'">'+fmt(totS-totP)+'</td>'+
    '</tr></tfoot></table></div></div>';
  document.getElementById('pl-body').innerHTML = html;
}

function drawTB() {

function showLedgerDetail() {
  var id = document.getElementById('ledger-sel').value;
  var party = DB.parties.find(function(p){ return p.id===id; });
  var el = document.getElementById('ledger-detail');
  var pb = document.getElementById('add-payment-btn');
  var eb = document.getElementById('export-ledger-btn');
  if (!party) { if(el)el.innerHTML=''; if(pb)pb.style.display='none'; if(eb)eb.style.display='none'; return; }
  if(pb)pb.style.display='inline-flex';
  if(eb)eb.style.display='inline-flex';

  var mode = (document.getElementById('ledger-mode')||{}).value || 'fy';
  var allSales = DB.salesInvoices.filter(function(i){ return sameText(i.party, party.name); });
  var allPurch = DB.purchaseBills.filter(function(i){ return sameText(i.party, party.name); });
  var allPay   = (DB.payments||[]).filter(function(p){ return sameText(p.party, party.name); });

  var periodStart, periodEnd, periodLabel, sales, purch, pays;

  if (mode === 'range') {
    periodStart = (document.getElementById('ledger-from')||{}).value || '0000-01-01';
    periodEnd   = (document.getElementById('ledger-to')||{}).value || '9999-12-31';
    periodLabel = fmtDateDMY(periodStart) + ' to ' + fmtDateDMY(periodEnd);
    sales = allSales.filter(function(i){ return i.date>=periodStart && i.date<=periodEnd; });
    purch = allPurch.filter(function(i){ return i.date>=periodStart && i.date<=periodEnd; });
    pays  = allPay.filter(function(p){ return p.date>=periodStart && p.date<=periodEnd; });
  } else {
    var fy = getRepFY('ledger-fy');
    periodStart = fy.split('-')[0] + '-04-01';
    periodEnd   = (parseInt(fy.split('-')[0])+1) + '-03-31';
    periodLabel = 'FY ' + fy;
    sales = filterFY(allSales, fy);
    purch = filterFY(allPurch, fy);
    pays  = allPay.filter(function(p){ return fyOfDate(p.date)===fy; });
  }

  var totalSales = sales.reduce(function(s,i){ return s+(i.total||0); },0);
  var totalPurch = purch.reduce(function(s,i){ return s+(i.total||0); },0);
  var totalPaid  = pays.reduce(function(s,p){ return s+(p.amount||0); },0);

  // bal += Debit - Credit (Debit increases, Credit decreases — plain magnitude owed)
  var txns=[];
  sales.forEach(function(i){ txns.push({date:i.date,desc:i.number+' - Sales Invoice',dr:i.total,cr:0,tag:'sale',invId:i.id}); });
  purch.forEach(function(i){ txns.push({date:i.date,desc:i.number+' - Purchase Bill',dr:i.total,cr:0,tag:'purchase',invId:i.id}); });
  pays.forEach(function(p){
    txns.push({date:p.date,desc:(p.ref?p.ref+' - ':'')+'Payment '+p.mode,dr:0,cr:p.amount,tag:'payment',pid:p.id});
  });
  txns.sort(function(a,b){ return a.date.localeCompare(b.date); });

  // Opening balance = sum of every txn (all-time) strictly BEFORE periodStart
  var openingBal = 0;
  var priorTxns = [];
  allSales.forEach(function(i){ if (i.date < periodStart) priorTxns.push({date:i.date, dr:i.total, cr:0}); });
  allPurch.forEach(function(i){ if (i.date < periodStart) priorTxns.push({date:i.date, dr:i.total, cr:0}); });
  allPay.forEach(function(p){ if (p.date < periodStart) priorTxns.push({date:p.date, dr:0, cr:p.amount}); });
  priorTxns.sort(function(a,b){ return a.date.localeCompare(b.date); });
  priorTxns.forEach(function(t){ openingBal += t.dr - t.cr; });

  function fmtBal(amt) { return fmt(Math.abs(amt)); }
  function balColor(amt) { return amt > 0 ? 'var(--amber)' : 'var(--green)'; }

  var bal = openingBal;
  var closingBal = openingBal;
  txns.forEach(function(t){ closingBal += t.dr - t.cr; });

  var html = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">';
  html += statCard('Sales - '+periodLabel, fmt(totalSales), sales.length+' invoices', 'bb');
  html += statCard('Purchases - '+periodLabel, fmt(totalPurch), purch.length+' bills', 'ba');
  html += statCard('Payments - '+periodLabel, fmt(totalPaid), pays.length+' payments', 'bg');
  html += statCard('Closing Balance', fmtBal(closingBal), closingBal>0?'Outstanding':'Settled', closingBal>0?'br':'bg');
  html += '</div>';

  html += '<div class="tbl-wrap" id="ledger-printable"><div class="tbl-head"><span class="tbl-title">Ledger: '+esc(party.name)+' - '+esc(periodLabel)+'</span></div>';
  html += '<table><thead><tr><th>Date</th><th>Description</th><th>Type</th><th style="text-align:right">Debit</th><th style="text-align:right">Credit</th><th style="text-align:right">Balance</th><th class="no-print"></th></tr></thead><tbody>';
  html += '<tr style="background:var(--bg3)"><td colspan="5" style="padding:8px 14px;color:var(--text3);font-style:italic">Opening Balance ('+esc(periodLabel)+')</td>';
  html += '<td class="mono" style="text-align:right;padding:8px 14px;color:'+balColor(openingBal)+'">'+fmtBal(openingBal)+'</td><td class="no-print"></td></tr>';

  if (mode === 'fy') {
    // Group by month within the FY, as before
    var fy2 = getRepFY('ledger-fy');
    var fyMonths = monthsInFY(fy2);
    var txnsByMonth = {};
    txns.forEach(function(t){ var k=monthKey(t.date); if(!txnsByMonth[k])txnsByMonth[k]=[]; txnsByMonth[k].push(t); });
    fyMonths.forEach(function(k){
      var mTxns = txnsByMonth[k]||[];
      if (!mTxns.length) return;
      mTxns.forEach(function(t){ html += ledgerRow(t, bal += t.dr - t.cr); });
      var mEnd = bal;
      html += '<tr style="background:var(--bg3)">'+
        '<td colspan="5" style="padding:7px 14px;font-size:12px;color:var(--text2)">'+monthLabel(k)+' closing balance</td>'+
        '<td class="mono" style="text-align:right;padding:7px 14px;font-weight:600;color:'+balColor(mEnd)+'">'+fmtBal(mEnd)+'</td><td class="no-print"></td></tr>';
    });
  } else {
    // Flat list for custom date range, no month grouping
    txns.forEach(function(t){ html += ledgerRow(t, bal += t.dr - t.cr); });
  }

  var totalDebit = txns.reduce(function(s,t){ return s+t.dr; }, 0);
  var totalCredit = txns.reduce(function(s,t){ return s+t.cr; }, 0);

  html += '</tbody><tfoot><tr style="background:var(--bg3)">'+
    '<td colspan="3" style="padding:10px 14px;font-weight:600">Total ('+esc(periodLabel)+')</td>'+
    '<td class="mono" style="text-align:right;padding:10px 14px;font-weight:600">'+fmt(totalDebit)+'</td>'+
    '<td class="mono" style="text-align:right;padding:10px 14px;font-weight:600">'+fmt(totalCredit)+'</td>'+
    '<td class="no-print"></td></tr>'+
    '<tr style="background:var(--bg3)">'+
    '<td colspan="5" style="padding:10px 14px;font-weight:600">Closing Balance - '+esc(periodLabel)+'</td>'+
    '<td class="mono" style="text-align:right;padding:10px 14px;font-weight:600;color:var(--accent)">'+fmtBal(bal)+'</td><td class="no-print"></td>'+
    '</tr></tfoot></table></div>';

  function ledgerRow(t, runningBal) {
    var tagCls = t.tag==='sale'?'bb':t.tag==='purchase'?'ba':'bg';
    var tagLabel = t.tag==='sale'?'Sale':t.tag==='purchase'?'Purchase':'Payment';
    var row = '<tr><td>'+fmtDateDMY(t.date)+'</td><td>'+esc(t.desc)+'</td>';
    row += '<td><span class="pill '+tagCls+'" style="font-size:10px">'+tagLabel+'</span></td>';
    row += '<td class="mono" style="text-align:right">'+(t.dr>0?fmt(t.dr):'-')+'</td>';
    row += '<td class="mono" style="text-align:right">'+(t.cr>0?fmt(t.cr):'-')+'</td>';
    row += '<td class="mono" style="text-align:right;color:'+balColor(runningBal)+'">'+fmtBal(runningBal)+'</td>';
    if (t.tag==='payment') {
      row += '<td class="no-print payment-actions"><button class="btn btn-ghost btn-sm" onclick="editPayment(&quot;'+t.pid+'&quot;)"><i class="ti ti-edit"></i></button>'+
        '<button class="btn btn-danger btn-sm" onclick="deletePayment(&quot;'+t.pid+'&quot;)"><i class="ti ti-trash"></i></button></td>';
    } else if ((t.tag==='sale' || t.tag==='purchase') && !_mobileMode) {
      var invType = t.tag==='sale' ? 'sales' : 'purchases';
      row += '<td class="no-print payment-actions"><button class="btn btn-ghost btn-sm" onclick="editInv(&quot;'+t.invId+'&quot;,&quot;'+invType+'&quot;)"><i class="ti ti-edit"></i></button></td>';
    } else { row += '<td class="no-print"></td>'; }
    row += '</tr>';
    return row;
  }

  el.innerHTML = html;
}

function editPayment(id) {
  var p = (DB.payments||[]).find(function(x){ return x.id===id; });
  if (!p) return;
  var modeOpts = ['Cash','Bank Transfer','Cheque','UPI'].map(function(m){
    return '<option'+(p.mode===m?' selected':'')+'>'+m+'</option>';
  }).join('');
  modal('Edit Payment - ' + p.party,
    '<div class="form-grid">' +
    '<div class="fg"><label>Date *</label><input id="pay-date" type="date" value="' + esc(p.date) + '"></div>' +
    '<div class="fg"><label>Type *</label><select id="pay-type">' +
    '<option value="paid"'+(p.type==='paid'?' selected':'')+'>Payment Made (to supplier)</option>'+
    '<option value="received"'+(p.type==='received'?' selected':'')+'>Payment Received (from customer)</option>'+
    '</select></div>' +
    '<div class="fg"><label>Amount</label><input id="pay-amount" type="number" step="0.01" value="' + p.amount + '"></div>' +
    '<div class="fg"><label>Mode</label><select id="pay-mode">' + modeOpts + '</select></div>' +
    '<div class="fg full"><label>Reference / Note</label><input id="pay-ref" value="' + esc(p.ref||'') + '"></div>' +
    '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
    '<button class="btn btn-primary" onclick="saveEditPayment(&quot;' + id + '&quot;)"><i class="ti ti-check"></i>Save Changes</button>'
  );
}
function saveEditPayment(id) {
  var p = (DB.payments||[]).find(function(x){ return x.id===id; });
  if (!p) return;
  var newAmount = parseFloat(document.getElementById('pay-amount').value)||0;
  if (!newAmount) { toast('Enter a valid amount', 'error'); return; }
  var party = DB.parties.find(function(x){ return x.name===p.party; });
  // Reverse OLD effect, then apply NEW effect — both happen together, only after validation passes
  if (party) party.balance = p.type==='received' ? (party.balance||0)+p.amount : (party.balance||0)-p.amount;
  p.date = document.getElementById('pay-date').value;
  p.type = document.getElementById('pay-type').value;
  p.amount = newAmount;
  p.mode = document.getElementById('pay-mode').value;
  p.ref = document.getElementById('pay-ref').value;
  if (party) party.balance = p.type==='received' ? (party.balance||0)-p.amount : (party.balance||0)+p.amount;
  saveDB(); closeModal(); toast('Payment updated');
  showLedgerDetail();
}
function deletePayment(id) {
  if (!confirm('Delete this payment? The party balance will be reversed.')) return;
  var p = (DB.payments||[]).find(function(x){ return x.id===id; });
  if (!p) return;
  var party = DB.parties.find(function(x){ return x.name===p.party; });
  if (party) party.balance = p.type==='received' ? (party.balance||0)+p.amount : (party.balance||0)-p.amount;
  DB.payments = (DB.payments||[]).filter(function(x){ return x.id!==id; });
  saveDB(); toast('Payment deleted');
  showLedgerDetail();
}

function openPaymentForm() {
  var id = document.getElementById('ledger-sel').value;
  var party = DB.parties.find(function(p){ return p.id===id; });
  if (!party) return;
  modal('Record Payment — ' + party.name,

    '<div class="fg"><label>Amount (₹) *</label><input id="pay-amount" type="number" step="0.01" placeholder="0.00"></div>' +
    '<div class="fg"><label>Mode</label><select id="pay-mode"><option>Cash</option><option>Bank Transfer</option><option>Cheque</option><option>UPI</option></select></div>' +
    '<div class="fg full"><label>Reference / Note</label><input id="pay-ref" placeholder="Cheque no, UTR, or note"></div>' +
    '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
    '<button class="btn btn-primary" onclick="savePayment(\'' + party.id + '\')"><i class="ti ti-check"></i>Save Payment</button>'

}

function savePayment(partyId) {
  var amount = parseFloat(document.getElementById('pay-amount').value)||0;
  if (!amount) { toast('Enter a valid amount', 'error'); return; }
  var party = DB.parties.find(function(p){ return p.id===partyId; });
  if (!party) return;
  var type = document.getElementById('pay-type').value;
  if (!DB.payments) DB.payments = [];
  DB.payments.push({
    id: uid(), party: party.name, partyId: partyId,
    date: document.getElementById('pay-date').value,
    type: type, amount: amount,
    mode: document.getElementById('pay-mode').value,
    ref: document.getElementById('pay-ref').value
  });
  party.balance = type==='received' ? (party.balance||0)-amount : (party.balance||0)+amount;
  saveDB(); closeModal(); toast('Payment recorded');
  showLedgerDetail();
}

        '<td class="mono">'+fmt(i.total)+'</td>'+
        '<td><button class="btn btn-ghost btn-sm" onclick="viewInv(&quot;'+i.id+'&quot;,&quot;purchases&quot;)"><i class="ti ti-eye"></i></button></td></tr>';

// Override savePI on mobile to also push to queue
var _origSavePI = null;
function _wrapMobileSavePI() {
  if (_origSavePI) return;
  _origSavePI = savePI;
  savePI = function(editId) {
    _origSavePI(editId);
    if (_mobileMode) {
      // Find the PI that was just saved/edited
      var party = (document.getElementById('pi-party')||{}).value||'';
      var num = (document.getElementById('pi-no')||{}).value||'';
      var pi = (DB.proformaInvoices||[]).find(function(p){ return p.number===num&&p.party===party; });
      if (pi) { mobilePushPI(pi); setSyncStatus('PI saved & queued for sync'); }
    }
  };
}
